<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Slice Labeller</title>

    <style>
      body {
        background: #f2f2f2;
        font-family: sans-serif;
        margin: 0;
        padding: 30px;
        color: #333;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      .item {
        margin-bottom: 40px;
        padding: 20px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      }

      .track-title {
        font-size: 14px;
        margin-bottom: 12px;
        color: #777;
      }

      .timeline {
        display: flex;
        gap: 6px;
        align-items: center;
        width: 100%;
        height: 100%;
      }

      #timeline-container {
        position: relative;
        height: 120px;
        background: #111;
        margin-bottom: 40px;
        border-radius: 10px;
        overflow-x: auto;
        overflow-y: hidden;
      }

      #timeline-scroll {
        position: relative;
        height: 100%;
      }

      #timeline {
        height: 100%;
      }

      #playhead {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 2px;
        background: #00ff88;
      }

      .wave {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 20px;
        pointer-events: none;
      }

      /* =========================
         SEGMENTS
      ========================= */

      .segment {
        width: 140px;
        height: 60px;
        border-radius: 6px;
        position: relative;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: #fff;
      }

      .segment.active {
        outline: 3px solid #00ff88;
      }

      /* =========================
         SECTION COLORS
      ========================= */

      .segment.intro {
        background: #2c3e50;
      }
      .segment.build {
        background: #2980b9;
      }
      .segment.peak {
        background: #c0392b;
      }
      .segment.release {
        background: #27ae60;
      }
      .segment.outro {
        background: #7f8c8d;
      }
      .segment.ending {
        outline: 2px solid yellow;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div id="timeline-container">
        <div id="timeline"></div>
        <div id="playhead"></div>
      </div>

      <div id="tracks"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
