<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gravity Choir | System-Driven Sound</title>
    <style>
      body {
        margin: 0;
        background: #050505;
        color: #fff;
        font-family: monospace;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        pointer-events: none;
        opacity: 0.6;
      }
      .hint {
        font-size: 0.8rem;
        color: #666;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <div>
        <!--Orbitals:-->
        <span id="count">0</span>
      </div>
    </div>

    <script>
      /**
       * CORE SYSTEM LOGIC
       * interaction -> structure -> sound
       */

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      document.body.appendChild(canvas);

      let width, height;
      let audioCtx;
      const monoliths = [];
      const orbitals = [];

      // Audio Setup: Global Reverb/Limiter
      let masterBus;

      function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterBus = audioCtx.createGain();
        const limiter = audioCtx.createDynamicsCompressor();
        limiter.threshold.setValueAtTime(-10, audioCtx.currentTime);
        masterBus.connect(limiter);
        limiter.connect(audioCtx.destination);
      }

      class Monolith {
        constructor(x, y, mass) {
          this.x = x;
          this.y = y;
          this.mass = mass;
          this.radius = 20;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(255,255,255,0.2)";
          ctx.stroke();
          ctx.fillStyle = "#000";
          ctx.fill();
        }
      }

      class Orbital {
        constructor(x, y, vx, vy) {
          this.x = x;
          this.y = y;
          this.vx = vx;
          this.vy = vy;
          this.history = [];
          this.setupSynth();
        }

        setupSynth() {
          this.osc = audioCtx.createOscillator();
          this.gain = audioCtx.createGain();
          this.filter = audioCtx.createBiquadFilter();

          this.osc.type = "sine";
          this.gain.gain.setValueAtTime(0, audioCtx.currentTime);

          this.osc.connect(this.filter);
          this.filter.connect(this.gain);
          this.gain.connect(masterBus);

          this.osc.start();
        }

        update(monoliths) {
          monoliths.forEach((m) => {
            const dx = m.x - this.x;
            const dy = m.y - this.y;
            const distSq = dx * dx + dy * dy;
            const dist = Math.sqrt(distSq);

            // Gravity rule
            const force = m.mass / distSq;
            this.vx += (dx / dist) * force;
            this.vy += (dy / dist) * force;

            // Audio Emergence: Pitch = Distance, Timbre = Stability
            const radialVel = Math.abs((this.vx * dx + this.vy * dy) / dist);
            const freq = Math.max(50, 200000 / dist);

            this.osc.frequency.setTargetAtTime(
              freq,
              audioCtx.currentTime,
              0.05,
            );

            // Stability translates to filter resonance and distortion
            // Stable (low radial velocity) = Pure sine
            // Unstable (high radial velocity) = Noisy/Complex
            this.filter.Q.value = radialVel * 2;
            this.filter.frequency.setTargetAtTime(
              freq * (1 + radialVel),
              audioCtx.currentTime,
              0.05,
            );

            const volume = Math.min(0.2, 50 / dist);
            this.gain.gain.setTargetAtTime(volume, audioCtx.currentTime, 0.1);
          });

          this.x += this.vx;
          this.y += this.vy;

          this.history.push({ x: this.x, y: this.y });
          if (this.history.length > 100) this.history.shift();
        }

        draw() {
          const vel = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
          const hue = Math.min(280, 180 + vel * 20); // Blue to Purple

          ctx.beginPath();
          ctx.moveTo(this.history.x, this.history.y);
          for (let p of this.history) ctx.lineTo(p.x, p.y);
          ctx.strokeStyle = `hsla(${hue}, 80%, 60%, 0.5)`;
          ctx.stroke();

          ctx.fillStyle = "#fff";
          ctx.fillRect(this.x - 1, this.y - 1, 2, 2);
        }
      }

      // Interaction handling
      let isDragging = false;
      let startPos = { x: 0, y: 0 };

      window.onmousedown = (e) => {
        initAudio();
        isDragging = true;
        startPos = { x: e.clientX, y: e.clientY };
      };

      window.onmouseup = (e) => {
        if (!isDragging) return;
        const vx = (startPos.x - e.clientX) * 0.05;
        const vy = (startPos.y - e.clientY) * 0.05;
        orbitals.push(new Orbital(startPos.x, startPos.y, vx, vy));
        document.getElementById("count").innerText = orbitals.length;
        isDragging = false;
      };

      window.onresize = () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        monoliths.length = 0;
        monoliths.push(new Monolith(width / 2, height / 2, 500));
      };

      function animate() {
        ctx.fillStyle = "rgba(5, 5, 5, 0.2)"; // Motion blur trail
        ctx.fillRect(0, 0, width, height);

        monoliths.forEach((m) => m.draw());
        orbitals.forEach((o) => {
          o.update(monoliths);
          o.draw();
        });

        requestAnimationFrame(animate);
      }

      window.onresize();
      animate();
    </script>
  </body>
</html>
