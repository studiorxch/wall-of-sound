title: Wall of Sound
description: StudioRich Dev Specs, logs, recovery notes, and implementation history for Wall + Sound.

collections:
  specs:
    output: true
    permalink: /specs/:path/
  logs:
    output: true
    permalink: /logs/:path/

defaults:
  - scope:
      path: ""
      type: "specs"
    values:
      layout: spec
  - scope:
      path: ""
      type: "logs"
    values:
      layout: log

markdown: kramdown
theme: minima
