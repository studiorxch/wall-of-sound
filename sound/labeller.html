<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Segment Labeller</title>

    <script src="https://unpkg.com/wavesurfer.js"></script>

    <style>
      body {
        background: #f2f2f2;
        font-family: sans-serif;
        margin: 0;
        padding: 30px;
        color: #333;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      .item {
        margin-bottom: 40px;
        padding: 20px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      }

      .track-title {
        font-size: 14px;
        margin-bottom: 12px;
        color: #777;
      }

      .timeline {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .segment {
        width: 140px;
        height: 60px;
        background: #e6e6e6;
        border-radius: 6px;
        overflow: hidden;
        position: relative;
        cursor: pointer;
      }

      .segment.active {
        outline: 2px solid #00ff88;
      }

      /* dashed ending indicator */
      .segment.ending {
        outline: 2px dashed rgba(255, 0, 0, 0.4);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div id="list"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
